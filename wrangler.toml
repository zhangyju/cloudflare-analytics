name = "cf-analytics"
type = "javascript"
account_id = "YOUR_ACCOUNT_ID"
workers_dev = true

# 绑定到R2存储桶
[[r2_buckets]]
binding = "LOGS_BUCKET"
bucket_name = "cf-logs"

# KV命名空间绑定
[[kv_namespaces]]
binding = "CACHE"
id = "YOUR_KV_ID"

# 环境变量
[env.production]
routes = [{ pattern = "*.example.com/api/*", zone_id = "YOUR_ZONE_ID" }]

[env.development]
routes = [{ pattern = "localhost:8787/api/*" }]
